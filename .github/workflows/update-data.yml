name: Update Data, Retrain & Simulate

# Runs after each tournament game day to refresh results, retrain the model,
# and publish new simulation results. Timed at 04:30 UTC (12:30am ET) so all
# games — including late West Coast tip-offs — are finished before the run.
#
# 2026 tournament schedule (all dates ET → run UTC next day at 04:30):
#   First Four:   Mar 17–18  → run Mar 18–19
#   Round of 64:  Mar 19–20  → run Mar 20–21
#   Round of 32:  Mar 21–22  → run Mar 22–23
#   Sweet 16:     Mar 26–27  → run Mar 27–28
#   Elite 8:      Mar 28–29  → run Mar 29–30
#   Final Four:   Apr 4      → run Apr 5
#   Championship: Apr 6      → run Apr 7
#
# Data strategy:
#   - Completed seasons (2015–2025, excl. 2020 COVID) are cached in repo; scraped once ever.
#   - Current season (2026): normal runs do an incremental scrape from 2026-03-15 (Selection Sunday)
#     using get_games_range(), merging into the existing games_2026.csv. Takes ~5 sec vs ~3 min.
#   - Manual trigger with full_rescrape=true re-fetches all seasons including 2015-2019 history.

concurrency:
  group: pipeline
  cancel-in-progress: true

on:
  push:
    branches:
      - main

  schedule:
    # After First Four + R64 + R32 game days (Mar 17–22 games → run Mar 18–23)
    - cron: '30 4 18-23 3 *'
    # After S16 + E8 game days (Mar 26–29 games → run Mar 27–30)
    - cron: '30 4 27-30 3 *'
    # After Final Four (Apr 4) and Championship (Apr 6)
    - cron: '30 4 5,7 4 *'

  workflow_dispatch:
    inputs:
      bracket_file:
        description: 'Bracket CSV committed to repo (e.g. data/brackets/official_2026.csv)'
        required: false
        default: ''
      official_bracket:
        description: 'Parse bracket as official NCAA format'
        type: boolean
        default: false
      sims:
        description: 'Number of simulations to run'
        required: false
        default: '5000'
      full_rescrape:
        description: 'Re-scrape all historical seasons (slow, ~20 min)'
        type: boolean
        default: false

  # Called by bracket-watch.yml when a new official bracket is detected
  workflow_call:
    inputs:
      bracket_file:
        type: string
        required: false
        default: ''
      official_bracket:
        type: boolean
        default: false
      sims:
        type: string
        default: '5000'

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit results back to main

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git push works cleanly

      # ── 2. Python env ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore raw data cache ──────────────────────────────────────────
      #   Caches data/raw pickles so repeat runs of full-rescrape are faster.
      - name: Restore raw data cache
        if: inputs.full_rescrape == true
        uses: actions/cache@v5
        with:
          path: data/raw
          key: raw-data-v1

      # ── 4. Scrape ──────────────────────────────────────────────────────────
      #   Historical seasons (2015-2025, excl. 2020) are committed to the repo — scraped once.
      #   Normal runs only fetch the last 14 days of games via --lookback-days,
      #   which captures conference tournaments + early NCAA rounds without re-scraping
      #   the full regular season. Takes ~15 sec instead of ~3 min.
      #   Use manual full_rescrape=true to re-fetch all seasons if needed.
      - name: Scrape current season (incremental, last 14 days)
        if: inputs.full_rescrape != true
        run: python scripts/scrape_with_cbbpy.py --lookback-days 14 --out data/processed --raw data/raw

      - name: Scrape all seasons (manual full rescrape only)
        if: inputs.full_rescrape == true
        run: python scripts/run_pipeline.py --mode scrape --historical

      # ── 5. Refresh projected seeds (bracketmatrix.com) ────────────────────
      #   Scrapes consensus projected seeds for the current season so that the
      #   auto-bracket and model have up-to-date seed information. Safe to fail
      #   (e.g., site down) — features step will use the committed seeds_2026.csv.
      - name: Fetch projected seeds from bracketmatrix.com
        run: python scripts/fetch_bracketmatrix_seeds.py || echo "Bracketmatrix fetch failed; using cached seeds"

      # ── 5b. Refresh NCAA NET rankings ─────────────────────────────────────
      #   Scrapes current NET rankings from ncaa.com. Safe to fail — features step
      #   will proceed without net_rank if the file is missing (it becomes optional).
      #   NET is scraped weekly (not daily) since it updates Tuesday mornings.
      - name: Fetch NCAA NET rankings
        run: python scripts/fetch_net_rankings.py || echo "NET rankings fetch failed; skipping"

      # ── 5c. Refresh BartTorvik T-Rank efficiency data ─────────────────────
      #   Fetches adjusted efficiency metrics (AdjOE, AdjDE, Barthag, WAB) for the
      #   current season from barttorvik.com's open JSON API. Historical seasons
      #   (2019-2025) are already committed; only the current year is refreshed here.
      #   Safe to fail — features step will use the committed barttorvik_*.csv files.
      - name: Fetch BartTorvik T-Rank data
        run: python scripts/fetch_barttorvik.py --season 2026 || echo "BartTorvik fetch failed; using cached data"

      # ── 6. Build features ──────────────────────────────────────────────────
      - name: Build features
        run: python scripts/run_pipeline.py --mode features

      # ── 6. Train model ─────────────────────────────────────────────────────
      - name: Train model
        run: |
          python scripts/run_pipeline.py \
            --mode train \
            --include_regular_season \
            --regular_season_weight 0.3

      # ── 7. Simulate ────────────────────────────────────────────────────────
      #   Default: 5000 sims for scheduled/push runs (~5-6 min on Actions).
      #   Override via workflow_dispatch sims input for deeper analysis.
      #   With official bracket: use committed bracket file.
      #   Without bracket: adj_margin-based team selection (pre-bracket estimate).
      - name: Simulate (with official bracket)
        if: inputs.bracket_file != ''
        timeout-minutes: 20
        run: |
          python scripts/run_pipeline.py \
            --mode simulate \
            --bracket_file "${{ inputs.bracket_file }}" \
            --sims ${{ inputs.sims || '5000' }} \
            --seed 2026

      - name: Simulate (adj_margin selection, no bracket)
        if: inputs.bracket_file == ''
        timeout-minutes: 20
        run: |
          python scripts/run_pipeline.py \
            --mode simulate \
            --sims ${{ inputs.sims || '5000' }} \
            --seed 2026

      # ── 8. Generate charts ─────────────────────────────────────────────────
      - name: Find latest sim output
        id: latest_sim
        run: |
          latest=$(ls -t results/sim_*.json 2>/dev/null | head -1)
          echo "path=${latest}" >> "$GITHUB_OUTPUT"

      - name: Generate charts
        if: steps.latest_sim.outputs.path != ''
        run: |
          python scripts/generate_charts.py \
            --sim "${{ steps.latest_sim.outputs.path }}"

      - name: Generate bracket visual
        if: steps.latest_sim.outputs.path != ''
        run: |
          python scripts/generate_bracket_visual.py \
            --sim "${{ steps.latest_sim.outputs.path }}"

      # ── 9. Commit results back to main ─────────────────────────────────────
      #   Only commits files that changed. The [skip ci] tag prevents a loop.
      #   We commit: simulation JSON, chart PNGs, training summary, and the
      #   current-season games CSV so future runs do incremental scrapes.
      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/sim_results.json || true
          git add \
            results/charts/ \
            models/training_summary.json \
            data/processed/games_2026.csv \
            data/processed/features/seeds_2026.csv \
            data/processed/features/net_2026.csv \
            data/processed/features/barttorvik_2026.csv \
            || true
          # Only push if there are actual changes
          if ! git diff --staged --quiet; then
            git commit -m "auto: refresh sim results $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

