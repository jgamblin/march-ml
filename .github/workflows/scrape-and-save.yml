# DEPRECATED — superseded by update-data.yml (runs every 6 hours, retrains and
# commits simulation results back to the repo). This file is kept for reference
# but its schedule has been removed. Trigger manually via workflow_dispatch if
# you only need a raw data artifact without a full retrain.

name: Scrape only (manual / legacy)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/run_pipeline.py --mode scrape

      - name: Upload processed data artifact
        uses: actions/upload-artifact@v7
        with:
          name: processed-data
          path: data/processed
