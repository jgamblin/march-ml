name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'results/sim_results.json'
      - 'results/tournament_results.json'
  # Re-deploy after every successful data update (auto-commits use [skip ci]
  # which would suppress push triggers, so we use workflow_run instead).
  workflow_run:
    workflows: ["Update Data, Retrain & Simulate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts
        run: |
          latest=$(ls -t results/sim_*.json 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            python scripts/generate_charts.py --sim "$latest"
            python scripts/generate_bracket_visual.py --sim "$latest"
          fi

      - name: Stage site files
        run: |
          mkdir -p _site
          cp -r web/. _site/
          cp -r results _site/results

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
